services:
  postgres:
    image: postgres:16-alpine
    container_name: devpulse-db
    environment:
      POSTGRES_USER: devpulse
      POSTGRES_PASSWORD: devpulse
      POSTGRES_DB: devpulse
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U devpulse']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - devpulse

  redis:
    image: redis:7-alpine
    container_name: devpulse-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - devpulse

  # Production image — only starts with: docker compose --profile production up
  # For local dev, run the API with: pnpm dev
  api:
    profiles: ["production"]
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "17642:17642"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://devpulse:devpulse@postgres:5432/devpulse
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:38929}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - devpulse

volumes:
  postgres_data:
  redis_data:

networks:
  devpulse:
